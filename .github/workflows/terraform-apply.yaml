on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      runs_on:
        required: false
        type: string
        default: '"ubuntu-latest"'
      # See terraform-plan.yaml for the full stack semantics — this is the
      # same contract, and both workflows resolve TF_WORKING_DIR /
      # TF_STATE_CONTAINER / TF_STATE_BLOB identically.
      stack:
        required: false
        type: string
        default: ''
    # Secrets consumed via `secrets: inherit` in the caller.

env:
  TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
  TF_VAR_admin_ssh_public_key: ${{ secrets.ADMIN_SSH_PUBLIC_KEY }}
  TF_VAR_github_pat: ${{ secrets.GH_RUNNER_PAT }}
  TF_VAR_github_org: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.event.repository.name }}
  TF_VAR_allowed_ssh_source_prefixes: ${{ vars.ALLOWED_SSH_SOURCE_PREFIXES }}
  TF_VAR_jumpbox_entra_admin_object_ids: ${{ vars.JUMPBOX_ENTRA_ADMIN_OBJECT_IDS }}

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    environment: ${{ inputs.environment }}

    env:
      TF_WORKING_DIR: >-
        ${{ inputs.stack != ''
          && format('{0}/{1}/terraform', vars.TERRAFORM_WORKING_DIRECTORY, inputs.stack)
          || vars.TERRAFORM_WORKING_DIRECTORY }}
      TF_STATE_CONTAINER: >-
        ${{ inputs.stack != ''
          && format('tfstate-{0}', inputs.stack)
          || vars.TERRAFORM_STATE_CONTAINER }}
      TF_STATE_BLOB: >-
        ${{ inputs.stack != ''
          && format('{0}.tfstate', inputs.stack)
          || vars.TERRAFORM_STATE_BLOB }}

    defaults:
      run:
        shell: bash

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Enable public access for backend storage account
      run: |
        az storage account update \
        --name ${{ vars.STORAGE_ACCOUNT }} \
        --resource-group ${{ vars.RESOURCE_GROUP }} \
        --public-network-access Enabled

        echo "Enabling public network access and waiting for 10 seconds."
        sleep 10

    - name: Terraform Init
      id: init
      run: |
        terraform -chdir=${{ env.TF_WORKING_DIR }} init \
        -backend-config="resource_group_name=${{ vars.RESOURCE_GROUP }}" \
        -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT }}" \
        -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
        -backend-config="key=${{ env.TF_STATE_BLOB }}"
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Download the plan
      uses: actions/download-artifact@v4
      with:
        name: tf-plan
        path: ${{ env.TF_WORKING_DIR }}/

    - name: Apply the plan
      id: apply
      run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve out.tfplan
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Disable public access for backend storage account
      if: always()
      run: |
        az storage account update \
        --name ${{ vars.STORAGE_ACCOUNT }} \
        --resource-group ${{ vars.RESOURCE_GROUP }} \
        --public-network-access Disabled
