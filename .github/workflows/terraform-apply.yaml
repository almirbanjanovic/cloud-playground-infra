on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      # Optional runner selection. Value must be a JSON-encoded string:
      #   '"ubuntu-latest"'                    (single label)
      #   '["self-hosted", "ai-foundry"]'      (multiple labels)
      # Default preserves the historical `runs-on: ubuntu-latest` behavior
      # so existing callers keep working without change.
      runs_on:
        required: false
        type: string
        default: '"ubuntu-latest"'
    # Secrets are consumed via `secrets: inherit` in the caller so that
    # GitHub-Environment-scoped secrets are visible to the job that
    # selects the environment. No explicit `secrets:` mapping is required.

# Environment variables forwarded to every Terraform step.
# See terraform-plan.yaml for the full rationale on why unmatched
# `TF_VAR_*` values are safe for envs that don't declare those variables.
env:
  TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
  TF_VAR_admin_ssh_public_key: ${{ secrets.ADMIN_SSH_PUBLIC_KEY }}
  TF_VAR_github_pat: ${{ secrets.GH_RUNNER_PAT }}
  # github_org and github_repo are derived from GitHub context so they don't
  # need to be stored as env vars. See terraform-plan.yaml for details.
  TF_VAR_github_org: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.event.repository.name }}
  TF_VAR_allowed_ssh_source_prefixes: ${{ vars.ALLOWED_SSH_SOURCE_PREFIXES }}
  TF_VAR_jumpbox_entra_admin_object_ids: ${{ vars.JUMPBOX_ENTRA_ADMIN_OBJECT_IDS }}

jobs: 
  terraform-apply:
    name: Terraform Apply
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    environment: ${{ inputs.environment}}

    defaults:
        run:
          shell: bash

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Enable public access for backend storage account
      run: |
        az storage account update \
        --name ${{ vars.STORAGE_ACCOUNT }} \
        --resource-group ${{ vars.RESOURCE_GROUP }} \
        --public-network-access Enabled

        # Wait for 10 seconds
        echo "Enabling public network access and waiting for 10 seconds."
        sleep 10
        

    - name: Terraform Init
      id: init
      run: |
        terraform -chdir=${{ vars.TERRAFORM_WORKING_DIRECTORY }} init \
        -backend-config="resource_group_name=${{ vars.RESOURCE_GROUP }}" \
        -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT }}" \
        -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
        -backend-config="key=${{ vars.TERRAFORM_STATE_BLOB }}"
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Download the plan
      uses: actions/download-artifact@v4
      with:
        name: tf-plan
        path: ${{ vars.TERRAFORM_WORKING_DIRECTORY }}/

    - name: Apply the plan
      id: apply
      run: terraform -chdir=${{ vars.TERRAFORM_WORKING_DIRECTORY }} apply -auto-approve out.tfplan
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    # -------------------------------------------------------------------------
    # ai-foundry-base ONLY: propagate the runner UAMI's client_id into the
    # ai-foundry-workload GitHub environment so the workload workflow
    # authenticates as the self-hosted runner UAMI (not the bootstrap
    # principal). Runs only on successful apply of the base env. No-op for
    # every other environment.
    #
    # Requires `GH_ADMIN_PAT` (repo-level secret, inherited via
    # `secrets: inherit` in the caller). The bootstrap workflow required the
    # same secret, so it's already present.
    # -------------------------------------------------------------------------
    - name: Propagate runner UAMI client_id to ai-foundry-workload env
      if: success() && inputs.environment == 'ai-foundry-base'
      env:
        GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
      run: |
        set -euo pipefail
        RUNNER_CLIENT_ID=$(terraform -chdir=${{ vars.TERRAFORM_WORKING_DIRECTORY }} output -raw runner_uami_client_id)
        if [[ -z "$RUNNER_CLIENT_ID" ]]; then
          echo "runner_uami_client_id output is empty — skipping propagation."
          exit 1
        fi
        printf '%s' "$RUNNER_CLIENT_ID" | \
          gh secret set AZURE_CLIENT_ID \
            --env ai-foundry-workload \
            --repo "${{ github.repository }}"
        echo "AZURE_CLIENT_ID on ai-foundry-workload updated to runner UAMI (${RUNNER_CLIENT_ID:0:8}...)."

    - name: Disable public access for backend storage account
      if: always()
      run: |
        az storage account update \
        --name ${{ vars.STORAGE_ACCOUNT }} \
        --resource-group ${{ vars.RESOURCE_GROUP }} \
        --public-network-access Disabled