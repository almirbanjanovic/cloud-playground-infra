name: Terraform Init Remote Backend
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: kaito-on-aks
        type: choice
        options:
          - kaito-on-aks
          - ai-foundry
          - apim-lab
          - apim-mcp
          - backend-pool-load-balancing

permissions:
  id-token: write
  contents: read

jobs:

  init-backend:
    name: Init Terraform Backend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:

      - name: 'Az CLI login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          set -e

          if ! az group show --name ${{ vars.RESOURCE_GROUP }} &> /dev/null; then
            echo "Resource group ${{ vars.RESOURCE_GROUP }} does not exist. Creating..."
            az group create --name ${{ vars.RESOURCE_GROUP }} --location ${{ vars.LOCATION }} --tags ${{ secrets.TAGS }}
          else
            echo "Resource group ${{ vars.RESOURCE_GROUP }} already exists..."
          fi

      - name: Create Remote Backend Storage Account and Containers
        # ai-foundry consolidates base + workload under a single GitHub
        # environment, but each Terraform stack gets its own container so
        # state files are physically separated. For that env we create
        # `tfstate-base` and `tfstate-workload`. Every other env still uses
        # its single `vars.TERRAFORM_STATE_CONTAINER`.
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          DEFAULT_CONTAINER: ${{ vars.TERRAFORM_STATE_CONTAINER }}
        run: |
          set -e
          wait_time=30

          disable_public_access() {
            echo "Disabling public network access..."
            az storage account update \
            --name ${{ vars.STORAGE_ACCOUNT }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --public-network-access Disabled
          }

          trap disable_public_access EXIT

          if ! az storage account show --resource-group ${{ vars.RESOURCE_GROUP }} --name ${{ vars.STORAGE_ACCOUNT }} > /dev/null 2>&1; then
            echo "Creating storage account ${{ vars.STORAGE_ACCOUNT }}..."
            az storage account create \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --name ${{ vars.STORAGE_ACCOUNT }} \
              --sku ${{ vars.STORAGE_ACCOUNT_SKU }} \
              --encryption-services ${{ vars.STORAGE_ACCOUNT_ENCRYPTION_SERVICES }} \
              --min-tls-version ${{ vars.STORAGE_ACCOUNT_MIN_TLS_VERSION }} \
              --location ${{ vars.LOCATION }} \
              --public-network-access ${{ vars.STORAGE_ACCOUNT_PUBLIC_NETWORK_ACCESS }}

            sleep $wait_time
          else
            echo "Storage account ${{ vars.STORAGE_ACCOUNT }} already exists..."

            az storage account update \
              --name ${{ vars.STORAGE_ACCOUNT }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --public-network-access Enabled

            echo "Enabling public network access and waiting for ${wait_time} seconds..."
            sleep $wait_time
          fi

          # Determine which containers to create.
          if [[ "$ENVIRONMENT" == "ai-foundry" ]]; then
            containers=(tfstate-base tfstate-workload)
          else
            if [[ -z "$DEFAULT_CONTAINER" ]]; then
              echo "::error::vars.TERRAFORM_STATE_CONTAINER is empty for environment=$ENVIRONMENT"
              exit 1
            fi
            containers=("$DEFAULT_CONTAINER")
          fi

          for c in "${containers[@]}"; do
            if ! az storage container show \
                    --name "$c" \
                    --account-name ${{ vars.STORAGE_ACCOUNT }} \
                    --auth-mode login > /dev/null 2>&1; then
              echo "Creating storage container '$c'..."
              az storage container create \
                --name "$c" \
                --account-name ${{ vars.STORAGE_ACCOUNT }} \
                --auth-mode login
            else
              echo "Storage container '$c' already exists."
            fi
          done
