name: Terraform Plan, Approve, Apply
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: kaito-on-aks
        type: choice
        options:
          - kaito-on-aks
          - apim-lab
          - apim-mcp
          - backend-pool-load-balancing

permissions:
  id-token: write
  contents: read
  issues: write

jobs:

  terraform-plan:
    name: Terraform Plan
    uses: ./.github/workflows/terraform-plan.yaml
    with:
      environment: ${{ inputs.environment }}
    # `secrets: inherit` forwards every repo/environment secret to the called
    # workflow. The called workflow's job selects the environment via
    # `environment: ${{ inputs.environment }}`, so env-scoped secrets and
    # variables resolve correctly there (not here in the caller).
    secrets: inherit

  manual-approval:
    name: Manual Approval
    needs: [terraform-plan]
    runs-on: ubuntu-latest
    steps:
      - uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ github.repository_owner }}
          minimum-approvals: 1
          issue-title: "Approve deployment to production"
          issue-body: "Please approve or deny the deployment."
          fail-on-denial: true

  terraform-apply:
    name: Terraform Apply
    needs: [manual-approval]
    uses: ./.github/workflows/terraform-apply.yaml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit
