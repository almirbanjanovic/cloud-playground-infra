name: Bootstrap GitHub Environments

# ------------------------------------------------------------------------------
# One-click population of the ai-foundry-base and ai-foundry-workload GitHub
# environments with the state-backend config + personal secrets/vars the
# terraform workflows need.
#
# Populates in BOTH environments (unless noted):
#   Secrets:
#     TAGS                    (space-separated key=value for the RG)
#     ADMIN_SSH_PUBLIC_KEY
#     GH_RUNNER_PAT           (masked in logs)
#   Variables:
#     RESOURCE_GROUP
#     LOCATION                (hardcoded to centralus — matches Terraform locals)
#     STORAGE_ACCOUNT
#     STORAGE_ACCOUNT_SKU                    (Standard_LRS)
#     STORAGE_ACCOUNT_ENCRYPTION_SERVICES    (blob)
#     STORAGE_ACCOUNT_MIN_TLS_VERSION        (TLS1_2)
#     STORAGE_ACCOUNT_PUBLIC_NETWORK_ACCESS  (Enabled — init-backend trap
#                                             disables it at exit)
#     TERRAFORM_STATE_CONTAINER              (tfstate)
#     ALLOWED_SSH_SOURCE_PREFIXES
#     JUMPBOX_ENTRA_ADMIN_OBJECT_IDS
#   Variables (per-env, hardcoded):
#     TERRAFORM_STATE_BLOB          base.tfstate  |  workload.tfstate
#     TERRAFORM_WORKING_DIRECTORY   environments/ai-foundry/{base,workload}/terraform
#
# NOT touched by this workflow (set by the operator following the root README):
#   AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
#     Set as REPO-level secrets pointing at a single App Registration in
#     Entra ID with two federated credentials (one per environment). Both
#     ai-foundry-base and ai-foundry-workload authenticate as this same App
#     Registration — the OIDC token subject controls which environment can
#     use it. See root README > "Configure new App Registration in
#     Microsoft Entra ID".
#   TF_VAR_github_org / TF_VAR_github_repo
#     Auto-derived at workflow runtime from GitHub context.
#
# Prereqs (see environments/ai-foundry/README.md):
#   1. App Registration in Entra ID with:
#        - subscription-scope Owner + Storage Blob Data Contributor
#        - federated credential for repo:{owner}/{repo}:environment:ai-foundry-base
#        - federated credential for repo:{owner}/{repo}:environment:ai-foundry-workload
#   2. Three REPO-level secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID,
#      AZURE_SUBSCRIPTION_ID.
#   3. Repo secret GH_ADMIN_PAT — fine-grained PAT with Environments r/w,
#      Secrets r/w, Variables r/w on this repo.
#
# Idempotent — re-run any time to rotate GH_RUNNER_PAT, update the SSH
# allowlist, change the RG name, etc.
# ------------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      state_storage_account_name:
        description: 'Globally-unique name for the Terraform state storage account. 3-24 lowercase alphanumerics, e.g. "staifoundry123456".'
        required: true
        type: string
      admin_ssh_public_key:
        description: 'OpenSSH public key for the jumpbox + runner admin user. Paste the full "ssh-ed25519 AAAA... user@host" line.'
        required: true
        type: string
      github_runner_pat:
        description: 'Fine-grained PAT with Administration: read/write on this repo (used by cloud-init to mint runner registration tokens). Masked in logs.'
        required: true
        type: string
      allowed_ssh_source_prefixes:
        description: 'JSON list of CIDRs allowed to SSH the jumpbox. Example: ["203.0.113.42/32"]. Never ["0.0.0.0/0"].'
        required: true
        type: string
        default: '[]'
      jumpbox_entra_admin_object_ids:
        description: 'JSON list of Entra object IDs granted Virtual Machine Administrator Login on the jumpbox. Example: ["11111111-2222-3333-4444-555555555555"].'
        required: true
        type: string
        default: '[]'
      resource_group_name:
        description: 'Azure resource group name for all ai-foundry resources.'
        required: false
        type: string
        default: 'rg-ai-foundry-dev'
      tags:
        description: 'Space-separated key=value tags applied to the resource group.'
        required: false
        type: string
        default: 'environment=dev workload=ai-foundry'

permissions:
  contents: read

env:
  # Hardcoded shape values — not per-deployment secrets, so they don't need
  # to be inputs. Change these together with local.location in base/workload
  # main.tf if you need a different region.
  LOCATION: centralus
  STORAGE_ACCOUNT_SKU: Standard_LRS
  STORAGE_ACCOUNT_ENCRYPTION_SERVICES: blob
  STORAGE_ACCOUNT_MIN_TLS_VERSION: TLS1_2
  # `Enabled` at creation; the init-backend workflow's `trap` disables it at
  # exit so the final state is `Disabled`. Setting `Disabled` here would
  # break the first init run — ubuntu-latest can't reach a private data plane.
  STORAGE_ACCOUNT_PUBLIC_NETWORK_ACCESS: Enabled
  TERRAFORM_STATE_CONTAINER: tfstate

jobs:
  populate:
    name: Populate ai-foundry-base and ai-foundry-workload
    runs-on: ubuntu-latest

    steps:
      - name: Mask sensitive workflow inputs in logs
        # workflow_dispatch inputs are NOT auto-masked. Explicitly mask the
        # runner PAT so it can't leak through downstream tool output or
        # accidental echo. The SSH public key is not sensitive.
        env:
          RUNNER_PAT: ${{ inputs.github_runner_pat }}
        run: |
          echo "::add-mask::$RUNNER_PAT"

      - name: Validate inputs
        env:
          ALLOWED: ${{ inputs.allowed_ssh_source_prefixes }}
          ADMIN_IDS: ${{ inputs.jumpbox_entra_admin_object_ids }}
          SA_NAME: ${{ inputs.state_storage_account_name }}
        run: |
          set -euo pipefail

          # JSON list inputs: verify shape AND element types up front so we
          # fail before writing anything (partial population is worse).
          jq_check='type == "array" and all(.[]; type == "string")'
          printf '%s' "$ALLOWED"   | jq -e "$jq_check" >/dev/null \
            || { echo "ALLOWED_SSH_SOURCE_PREFIXES is not a JSON array of strings"; exit 1; }
          printf '%s' "$ADMIN_IDS" | jq -e "$jq_check" >/dev/null \
            || { echo "JUMPBOX_ENTRA_ADMIN_OBJECT_IDS is not a JSON array of strings"; exit 1; }

          # Storage account name rules per Azure: 3-24 lowercase alphanumerics.
          if [[ ! "$SA_NAME" =~ ^[a-z0-9]{3,24}$ ]]; then
            echo "state_storage_account_name '$SA_NAME' is invalid: must be 3-24 lowercase alphanumerics."
            exit 1
          fi

      - name: Preflight — verify OIDC identity secrets are set at repo level
        # Following the repo's standard OIDC pattern (root README), the user
        # sets AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID as
        # REPO-level secrets pointing at a single App Registration in Entra
        # ID (with federated credentials for both ai-foundry-base and
        # ai-foundry-workload environments). Verify those exist before we
        # write env-scoped state config on top of them.
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          set -euo pipefail

          # Distinguish 404 (missing secret) from 401/403 (bad PAT scope) so
          # the user gets a useful error rather than "MISSING" for everything.
          probe() {
            local name="$1"
            local http_code
            http_code=$(gh api "repos/${{ github.repository }}/actions/secrets/$name" \
              --silent --include 2>/dev/null | awk '/^HTTP\// {print $2; exit}')
            # Fallback if --include isn't emitting a status line for some reason
            if [[ -z "${http_code:-}" ]]; then
              if gh api "repos/${{ github.repository }}/actions/secrets/$name" >/dev/null 2>&1; then
                http_code=200
              else
                http_code=unknown
              fi
            fi
            printf '%s' "$http_code"
          }

          missing=0
          fatal=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            code=$(probe "$name")
            case "$code" in
              200) echo "OK      $name (HTTP 200)" ;;
              404) echo "MISSING $name (HTTP 404)"; missing=1 ;;
              401|403) echo "FORBIDDEN $name (HTTP $code) \u2014 GH_ADMIN_PAT lacks Secrets: read on this repo"; fatal=1 ;;
              *)   echo "UNEXPECTED $name (HTTP $code)"; fatal=1 ;;
            esac
          done

          if [[ "$fatal" -eq 1 ]]; then
            echo ""
            echo "GH_ADMIN_PAT permission or API problem \u2014 cannot verify secret state."
            echo "Confirm the token has fine-grained permissions on this repo:"
            echo "  Environments: Read and write"
            echo "  Secrets:      Read and write"
            echo "  Variables:    Read and write"
            echo "  Metadata:     Read"
            exit 1
          fi

          if [[ "$missing" -eq 1 ]]; then
            echo ""
            echo "One or more OIDC identity secrets are missing at the REPO level."
            echo "Follow the root README section 'Configure new App Registration in"
            echo "Microsoft Entra ID' to create an App Registration with two federated"
            echo "credentials (one for repo:{owner}/{repo}:environment:ai-foundry-base,"
            echo "one for :environment:ai-foundry-workload), then set these three"
            echo "REPOSITORY secrets:"
            echo "  AZURE_CLIENT_ID       = Application (client) ID"
            echo "  AZURE_TENANT_ID       = Directory (tenant) ID"
            echo "  AZURE_SUBSCRIPTION_ID = Target subscription ID"
            exit 1
          fi
          echo "Preflight OK."

      - name: Ensure GitHub environments exist
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          set -euo pipefail
          for env_name in ai-foundry-base ai-foundry-workload; do
            gh api -X PUT "repos/${{ github.repository }}/environments/$env_name" >/dev/null
            echo "Ensured environment '$env_name' exists."
          done

      - name: Populate both environments
        env:
          GH_TOKEN:      ${{ secrets.GH_ADMIN_PAT }}
          TAGS:          ${{ inputs.tags }}
          SSH_PUB_KEY:   ${{ inputs.admin_ssh_public_key }}
          RUNNER_PAT:    ${{ inputs.github_runner_pat }}
          ALLOWED_CIDRS: ${{ inputs.allowed_ssh_source_prefixes }}
          ADMIN_IDS:     ${{ inputs.jumpbox_entra_admin_object_ids }}
          RG_NAME:       ${{ inputs.resource_group_name }}
          SA_NAME:       ${{ inputs.state_storage_account_name }}
          REPO:          ${{ github.repository }}
        run: |
          set -euo pipefail

          # `gh secret set` and `gh variable set` accept STDIN when no --body
          # flag is given (--body-file is NOT supported by either subcommand
          # in gh CLI 2.x). Piping via STDIN avoids shell-escaping multi-line
          # SSH keys or JSON with quotes. `gh` overwrites existing values,
          # making this workflow safely idempotent.

          set_secret()   { printf '%s' "$2" | gh secret   set "$1" --env "$3" --repo "$REPO"; }
          set_variable() { printf '%s' "$2" | gh variable set "$1" --env "$3" --repo "$REPO"; }

          for env_name in ai-foundry-base ai-foundry-workload; do
            echo "-> Populating '$env_name'"

            # Personal inputs (SSH + runner PAT + allowlists + tags)
            set_secret   TAGS                            "$TAGS"          "$env_name"
            set_secret   ADMIN_SSH_PUBLIC_KEY            "$SSH_PUB_KEY"   "$env_name"
            set_secret   GH_RUNNER_PAT                   "$RUNNER_PAT"    "$env_name"
            set_variable ALLOWED_SSH_SOURCE_PREFIXES     "$ALLOWED_CIDRS" "$env_name"
            set_variable JUMPBOX_ENTRA_ADMIN_OBJECT_IDS  "$ADMIN_IDS"     "$env_name"

            # Shared config (RG + state SA shape)
            set_variable RESOURCE_GROUP                        "$RG_NAME"                                "$env_name"
            set_variable LOCATION                              "$LOCATION"                               "$env_name"
            set_variable STORAGE_ACCOUNT                       "$SA_NAME"                                "$env_name"
            set_variable STORAGE_ACCOUNT_SKU                   "$STORAGE_ACCOUNT_SKU"                    "$env_name"
            set_variable STORAGE_ACCOUNT_ENCRYPTION_SERVICES   "$STORAGE_ACCOUNT_ENCRYPTION_SERVICES"    "$env_name"
            set_variable STORAGE_ACCOUNT_MIN_TLS_VERSION       "$STORAGE_ACCOUNT_MIN_TLS_VERSION"        "$env_name"
            set_variable STORAGE_ACCOUNT_PUBLIC_NETWORK_ACCESS "$STORAGE_ACCOUNT_PUBLIC_NETWORK_ACCESS"  "$env_name"
            set_variable TERRAFORM_STATE_CONTAINER             "$TERRAFORM_STATE_CONTAINER"              "$env_name"

            echo "   done: 3 secrets + 9 variables"
          done

          # Per-env terraform working directory + state blob key
          set_variable TERRAFORM_STATE_BLOB        "base.tfstate"                                  ai-foundry-base
          set_variable TERRAFORM_WORKING_DIRECTORY "environments/ai-foundry/base/terraform"        ai-foundry-base
          set_variable TERRAFORM_STATE_BLOB        "workload.tfstate"                              ai-foundry-workload
          set_variable TERRAFORM_WORKING_DIRECTORY "environments/ai-foundry/workload/terraform"    ai-foundry-workload

          echo ""
          echo "Bootstrap complete."
          echo "ai-foundry-base    : 3 secrets + 11 variables (from this workflow)"
          echo "ai-foundry-workload: 3 secrets + 11 variables (from this workflow)"
          echo ""
          echo "Next: run 'Terraform Init Remote Backend' with environment=ai-foundry-base."
