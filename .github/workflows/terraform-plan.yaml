on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      # Optional runner selection. Value must be a JSON-encoded string:
      #   '"ubuntu-latest"'                    (single label)
      #   '["self-hosted", "ai-foundry"]'      (multiple labels)
      # Default preserves the historical `runs-on: ubuntu-latest` behavior
      # so existing callers keep working without change.
      runs_on:
        required: false
        type: string
        default: '"ubuntu-latest"'
      # Optional stack selector for envs that colocate multiple Terraform
      # stacks under one GitHub environment. Currently used by ai-foundry,
      # which has `base` and `workload` stacks under a single
      # `ai-foundry` env. When set, the job derives:
      #   - working dir: `${vars.TERRAFORM_WORKING_DIRECTORY}/${stack}/terraform`
      #   - state container: `tfstate-${stack}`
      #   - state blob:  `${stack}.tfstate`
      # Path composition happens INSIDE this workflow because env-scoped
      # `vars.*` are only resolvable in a job that declares `environment:`
      # (the caller job that does `uses: ./...` doesn't). Empty string
      # (the default) preserves the current single-stack behavior for
      # every other env.
      stack:
        required: false
        type: string
        default: ''
    # Secrets are consumed via `secrets: inherit` in the caller so that
    # GitHub-Environment-scoped secrets are visible to the job that
    # selects the environment. No explicit `secrets:` mapping is required.

# Environment variables forwarded to every Terraform step.
#
# - `TF_VAR_resource_group_name` — shared by every env in this repo.
# - The remaining `TF_VAR_*` entries feed the ai-foundry base stack
#   (jumpbox + self-hosted runner). For any env that doesn't declare
#   those variables, unmatched `TF_VAR_*` values are ignored by
#   Terraform (soft warning only) so this is safe for kaito-on-aks,
#   apim-lab, apim-mcp, backend-pool-load-balancing.
# - Reading missing GitHub `secrets` / `vars` evaluates to an empty
#   string, not an error.
env:
  TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
  # ai-foundry base stack inputs. Ignored where the target env doesn't declare them.
  TF_VAR_admin_ssh_public_key: ${{ secrets.ADMIN_SSH_PUBLIC_KEY }}
  TF_VAR_github_pat: ${{ secrets.GH_RUNNER_PAT }}
  # github_org and github_repo are derived from GitHub context so they don't
  # need to be stored as env vars. `github.repository_owner` is the org/user;
  # `github.event.repository.name` is the repo name. Both are populated for
  # any trigger this workflow supports (workflow_call, workflow_dispatch).
  TF_VAR_github_org: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.event.repository.name }}
  TF_VAR_allowed_ssh_source_prefixes: ${{ vars.ALLOWED_SSH_SOURCE_PREFIXES }}
  TF_VAR_jumpbox_entra_admin_object_ids: ${{ vars.JUMPBOX_ENTRA_ADMIN_OBJECT_IDS }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    environment: ${{ inputs.environment }}

    # Job-level env resolves working-dir + backend config once per run using
    # env-scoped `vars.*` (available here because this job selects an
    # environment). `stack` toggles between single-stack (default) and
    # multi-stack (ai-foundry) behavior.
    env:
      TF_WORKING_DIR: >-
        ${{ inputs.stack != ''
          && format('{0}/{1}/terraform', vars.TERRAFORM_WORKING_DIRECTORY, inputs.stack)
          || vars.TERRAFORM_WORKING_DIRECTORY }}
      TF_STATE_CONTAINER: >-
        ${{ inputs.stack != ''
          && format('tfstate-{0}', inputs.stack)
          || vars.TERRAFORM_STATE_CONTAINER }}
      TF_STATE_BLOB: >-
        ${{ inputs.stack != ''
          && format('{0}.tfstate', inputs.stack)
          || vars.TERRAFORM_STATE_BLOB }}

    defaults:
      run:
        shell: bash

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Login to Azure using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v1

    - name: Terraform Format Check
      id: fmt
      # -chdir must target the actual stack directory, not repo root,
      # otherwise `terraform fmt` finds no .tf files to check.
      run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check
      continue-on-error: true

    - name: Enable public access for backend storage account
      run: |
        az storage account update \
        --name ${{ vars.STORAGE_ACCOUNT }} \
        --resource-group ${{ vars.RESOURCE_GROUP }} \
        --public-network-access Enabled

        # Wait for 10 seconds
        echo "Enabling public network access and waiting for 10 seconds."
        sleep 10

    - name: Terraform Init
      id: init
      run: |
        terraform -chdir=${{ env.TF_WORKING_DIR }} init \
        -backend-config="resource_group_name=${{ vars.RESOURCE_GROUP }}" \
        -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT }}" \
        -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
        -backend-config="key=${{ env.TF_STATE_BLOB }}"
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Terraform Validate
      id: validate
      run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

    - name: Init TFLint
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: tflint --init

    - name: Run TFLint
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: tflint -f compact

    - name: Terraform plan
      id: plan
      run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan --out=out.tfplan
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true
        ARM_USE_AZUREAD: true

    - name: Upload the plan
      uses: actions/upload-artifact@v4
      with:
        name: tf-plan
        path: ${{ env.TF_WORKING_DIR }}/out.tfplan

    - name: Disable public access for backend storage account
      if: always()
      run: |
        az storage account update \
        --name ${{ vars.STORAGE_ACCOUNT }} \
        --resource-group ${{ vars.RESOURCE_GROUP }} \
        --public-network-access Disabled
