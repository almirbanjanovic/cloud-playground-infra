title: Knowledge check
metadata:
  title: Knowledge check
  description: Verify what you learned about KAITO on AKS.
  ms.date: 04/28/2026
  author: almirbanjanovic
  ms.author: albanjanovic
  ms.topic: interactive-tutorial
durationInMinutes: 5
content: |
  [!include[](includes/7-knowledge-check.md)]
quiz:
  title: Check your knowledge
  questions:
    - content: 'Which Terraform argument enables the KAITO add-on on an AKS cluster?'
      choices:
        - content: '`ai_toolchain_operator_enabled = true`'
          isCorrect: true
          explanation: 'Correct. This single boolean on the `azurerm_kubernetes_cluster` resource installs the KAITO controllers and CRDs.'
        - content: '`enable_kaito = true`'
          isCorrect: false
          explanation: 'No such argument exists in the AzureRM provider.'
        - content: '`addon_profile.kaito.enabled = true`'
          isCorrect: false
          explanation: 'KAITO is not exposed via the legacy `addon_profile` block.'
    - content: 'What does the `kaito.sh/enablelb: "True"` annotation on a `Workspace` do?'
      choices:
        - content: 'Creates an Azure Load Balancer with a public IP in front of the inference pod.'
          isCorrect: true
          explanation: 'Correct. KAITO sees the annotation and provisions a `LoadBalancer` Service automatically. It is intended for testing only — there is no authentication.'
        - content: 'Enables horizontal pod autoscaling.'
          isCorrect: false
          explanation: 'KAITO does not configure HPA via this annotation.'
        - content: 'Switches the model to load-balanced multi-GPU inference.'
          isCorrect: false
          explanation: 'It only affects Service exposure, not the inference runtime.'
    - content: 'Why should you NOT use `kaito.sh/enablelb` in production?'
      choices:
        - content: 'It exposes the model on a public IP with no authentication in front of it.'
          isCorrect: true
          explanation: 'Correct. Production deployments should sit behind an Ingress controller with authentication and, ideally, NetworkPolicy + TLS.'
        - content: 'It does not work outside `centralus`.'
          isCorrect: false
          explanation: 'It is region-agnostic.'
        - content: 'It only supports GPU workloads.'
          isCorrect: false
          explanation: 'It works for both CPU and GPU workspaces.'
